[pytest]
# Environment markers (countries/weather/...) are registered dynamically from
# environments.yaml in the root conftest.py (pytest_configure) — adding an
# environment needs no edit here.

# Short tracebacks — for our exception types (SLAViolation/StatusMismatch/
# TransportError) the message IS the diagnosis; the verbose `--tb=auto` adds noise.
addopts = --tb=short

# Capture log records at INFO. pytest shows them ONLY for failing tests
# (the "Captured log call" section), so passing runs stay quiet.
log_level = INFO
